server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:lecture_team}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Pg@123456}
    driver-class-name: org.postgresql.Driver

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  auth:
    demo-user:
      user-id: 1
      username: admin
      password: admin123
      real-name: 超级管理员
      super-admin: true
  jwt:
    secret: change-this-secret-in-production
    expire-seconds: 7200
